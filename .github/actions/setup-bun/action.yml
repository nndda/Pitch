name: Setup Bun
description: Set up Bun and install dependencies

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2

    - uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - run: bun ci
      shell: bash

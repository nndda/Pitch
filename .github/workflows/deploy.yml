name: Deploy app

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'package.json'
      - 'bun.lock'
      - '**/*.svelte'
      - '**/*.scss'
      - '**/*.json'
      - '**/*.js'
      - '**/*.ts'
      - 'src/'
  workflow_dispatch:

jobs:
  deploy-gh-pages: # ----------------------------------------------------------
    name: Deploy to GitHub Pages

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun ci
      - name: Build app
        run: |
          bun run build --base=/Pitch/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages

  deploy-itch: # ---------------------------------------------------------
    name: Deploy to itch.io

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun ci
      - name: Build app
        run: |
          bunx vite build --base="./" -- --nightly

      # TODO: cache butler
      - name: Download & install butler
        run: |
          curl -L -o ./butler.zip https://broth.itch.zone/butler/linux-amd64/15.27.0/archive/default
          unzip -o ./butler.zip
          ./butler --version

      - name: Log in to butler
        run: |
          ./butler login
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push to Pitch nightly
        run: |
          ./butler push ./dist/ nnda/pitch-nightly:web --userversion-file ./dist/version.txt
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

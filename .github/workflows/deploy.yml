name: Deploy app

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'package.json'
      - 'bun.lock'
      - '**/*.svelte'
      - '**/*.scss'
      - '**/*.json'
      - '**/*.js'
      - '**/*.ts'
      - 'src/'
  workflow_dispatch:

jobs:
  build: # --------------------------------------------------------------------
    name: Build the app

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Build app
        run: |
          bun run build --base=/Pitch/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: pitch-dist
          path: dist/
          retention-days: 1

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy-gh-pages: # ----------------------------------------------------------
    name: Deploy to GitHub Pages

    needs: build

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages

  deploy-itch: # ---------------------------------------------------------
    name: Deploy to itch.io

    needs: build

    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
      - name: Download & install butler
        run: |
          curl -L -o ./butler.zip https://broth.itch.zone/butler/linux-amd64/15.27.0/archive/default
          unzip -o ./butler.zip
          ./butler --version

      - name: Log in to butler
        run: |
          ./butler login
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: pitch-dist
          path: $GITHUB_WORKSPACE/dist/

      - name: DEBUG
        run: |
          ls -l

      # - name: Push to Pitch nightly
      #   run: |
      #     ./butler push ./dist/ nnda/pitch-nightly:web --userversion 1.0.0-test
      #   env:
      #     BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

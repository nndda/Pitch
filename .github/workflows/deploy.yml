name: Deploy app

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'package.json'
      - 'bun.lock'
      - '**/*.svelte'
      - '**/*.scss'
      - '**/*.json'
      - '**/*.js'
      - '**/*.ts'
      - 'src/'
  workflow_dispatch:

env:
  BUTLER_VER: 15.27.0

jobs:
  deploy-gh-pages: # ----------------------------------------------------------
    name: Deploy to GitHub Pages

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup-bun

      - name: Build app
        run: |
          bun run build --base=/Pitch/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages

  deploy-itch: # ---------------------------------------------------------
    name: Deploy to itch.io

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup-bun

      - name: Build app
        run: |
          bunx vite build --base="./" -- --nightly

      - uses: ./.github/actions/setup-butler
        with:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push to Pitch nightly
        run: |
          ./butler push ./dist/ nnda/pitch-nightly:web --userversion-file ./dist/version.txt
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
